# Channelarr — example config
# Copy to ~/.config/channelarr/config.yaml and fill in your values.
# Or run: python3 channelarr.py --reconfigure

# ── Connection ────────────────────────────────────────────────────────────────

endpoint: "https://dispatcharr.example.com"   # no trailing slash
username: "admin"
password: "changeme"

# ── Matching ──────────────────────────────────────────────────────────────────

matching:
  # How streams are matched to channels:
  #   regex  — normalise names, then compare (default)
  #   exact  — case-insensitive exact match, no normalisation
  #   fuzzy  — similarity match; tune with fuzzy_threshold below
  strategy: "regex"

  # How names are cleaned before matching:
  #   default     — strips trailing HD/SD/4K/FHD/UHD and brackets
  #   aggressive  — also strips language/country prefixes and other noise
  #   none        — no cleaning, whitespace trim only
  normalizer: "default"

  # Minimum similarity score for fuzzy matching (0.0–1.0). Ignored unless strategy=fuzzy.
  fuzzy_threshold: 0.85

  # Set true to only match streams to channels in the same Dispatcharr channel group.
  # Prevents streams from one region matching channels in another.
  scope_to_group: false

# ── Provider priority ─────────────────────────────────────────────────────────
# When multiple streams match the same channel, this decides which one wins.
# List your M3U account names in priority order (highest first).
# Use the exact name from Dispatcharr → M3U Accounts.
# Unlisted providers are treated as lowest priority.

provider_priority:
  - "PrimaryProvider"
  - "BackupProvider"

# Tiebreaker when providers have equal (or no) priority:
#   highest_priority — use the ranking above
#   most_recent      — prefer the stream with the highest ID
#   first_match      — use whichever appeared first in the API response
conflict_resolution:
  strategy: "highest_priority"

# ── Safety defaults ───────────────────────────────────────────────────────────
# Both are false by default — Channelarr won't create or delete anything unless told to.
# Override for a single run with --allow-new-channels or --allow-delete.

allow_new_channels_default: false   # true = unmatched streams create new channels
allow_delete_default: false         # true = channels with no streams are deleted

# ── Group regions ─────────────────────────────────────────────────────────────
# Tells Channelarr which Dispatcharr channel groups belong to the same region.
# When set, a stream from region MY won't be matched to a channel in region UK,
# even if their names are identical (e.g. MY|CNN vs UK|CNN).
#
# Find your group IDs in Dispatcharr → Channel Groups.
# Leave as [] to disable region-aware matching.

group_regions: []
# group_regions:
#   - name: "MY"
#     groups: [1, 2, 3]
#   - name: "UK"
#     groups: [4, 5]

# ── Locks ─────────────────────────────────────────────────────────────────────
# Locked channels are never modified, even with --apply.
# They show as SKIP(LOCKED) in the diff so you know they were evaluated.
# To override a lock for one run: --unlock "Channel Name"

locks: []
# locks:
#   - channel_name: "BBC One"
#     reason: "Manually curated"

# ── Allowlist ─────────────────────────────────────────────────────────────────
# Process only these channels — everything else is skipped.
# Leave as [] to process all channels.

allowlist: []
# allowlist:
#   - "BBC One"
#   - "BBC Two"

# ── Blocklist ─────────────────────────────────────────────────────────────────
# These channels are always ignored. They won't appear in the diff at all.

blocklist: []
# blocklist:
#   - "Shopping Channel"

# ── EPG ───────────────────────────────────────────────────────────────────────
# Minimum confidence for --assign-epg proposals (0.0–1.0).
# Proposals below this threshold are hidden. 0.0 = show everything.
# Override for a single run with --epg-min-confidence 0.8

epg_min_confidence: 0.0

# ── Logging ───────────────────────────────────────────────────────────────────

logging:
  log_file: "~/.local/share/channelarr/channelarr.log"
  history_file: "~/.local/share/channelarr/history.jsonl"
  level: "INFO"   # DEBUG | INFO | WARNING | ERROR
